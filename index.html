<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Financial Planner</title>

    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/money-box.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://img.icons8.com/fluency/32/money-box.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Finanzas">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy: #1a2744;
            --gold: #c9a84c;
            --cream: #faf6ef;
            --red: #c0392b;
            --light-gold: #f0e0b0;
            --mid: #e8dfc8;
            --dark-text: #1a2744;
            --muted: #7a7060;
            --border: #d4c8a8;
            --star: #c9a84c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--cream);
            font-family: 'Lato', sans-serif;
            color: var(--dark-text);
            min-height: 100vh;
            padding: 15px;
        }

        .no-print { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }

        .btn {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 10px 15px;
            border: 2px solid var(--navy);
            background: var(--navy);
            color: var(--cream);
            cursor: pointer;
            border-radius: 2px;
        }
        .btn.secondary { background: white; color: var(--navy); }

        /* PAGE CONTAINER */
        .page {
            background: white;
            width: 100%;
            max-width: 860px;
            margin: 0 auto 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .stripe-top { height: 8px; background: repeating-linear-gradient(90deg, var(--navy) 0, var(--navy) 50px, var(--red) 50px, var(--red) 100px); }

        /* HEADER CORREGIDO */
        .page-header {
            padding: 30px 30px 20px;
            border-bottom: 2px solid var(--border);
            position: relative;
            background: linear-gradient(135deg, #fff 70%, var(--light-gold) 100%);
            display: flex;
            flex-direction: column; /* Apila elementos verticalmente en móvil */
        }

        .header-stars { display: flex; gap: 5px; margin-bottom: 10px; }
        .star { color: var(--star); font-size: 12px; }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--navy);
            line-height: 1.1;
        }
        .page-title span { color: var(--gold); }

        .page-subtitle {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* AJUSTE DE POSICIÓN DE LA FECHA */
        .header-right {
            margin-top: 20px; /* Le da aire para que no pise el título */
            text-align: left;
        }

        /* En Desktop volvemos a ponerlo a la derecha */
        @media (min-width: 700px) {
            .page-header { flex-direction: row; justify-content: space-between; align-items: flex-end; }
            .header-right { position: absolute; right: 40px; top: 40px; text-align: right; margin-top: 0; }
            .page-title { font-size: 42px; }
        }

        .week-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); text-transform: uppercase; }
        .week-input {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--navy);
            border: none;
            border-bottom: 2px solid var(--gold);
            background: transparent;
            width: 100%;
            max-width: 200px;
            outline: none;
        }

        /* CONTENIDO */
        .page-body { padding: 20px; }
        .section-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--navy); border-left: 4px solid var(--gold); padding-left: 10px; margin: 20px 0 15px; }

        .month-overview { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .month-overview { grid-template-columns: 1fr 1fr 1fr; } }

        .overview-card { background: var(--cream); border: 1.5px solid var(--border); padding: 15px; border-radius: 4px; border-left: 4px solid var(--gold); }
        .card-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); margin-bottom: 5px; }
        .card-value { display: flex; align-items: center; gap: 5px; }
        .dollar-sign { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--muted); }
        .card-input { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--navy); border: none; background: transparent; width: 100%; outline: none; border-bottom: 1.5px dashed var(--border); }

        .two-col { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 700px) { .two-col { grid-template-columns: 1fr 1fr; } }

        .budget-table { width: 100%; border-collapse: collapse; }
        .budget-table td { padding: 8px 0; border-bottom: 1px solid var(--mid); }
        .budget-table input { font-size: 13px; border: none; background: transparent; width: 100%; outline: none; }
        .amount { text-align: right; font-family: 'DM Mono', monospace; }

        .notes-area { width: 100%; height: 100px; border: 1.5px solid var(--border); background: var(--cream); padding: 10px; outline: none; resize: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="no-print">
    <button class="btn" onclick="saveData()">💾 SAVE</button>
    <button class="btn secondary" onclick="loadData()">📂 LOAD</button>
    <button class="btn secondary" onclick="window.print()">🖨 PRINT</button>
</div>

<div class="page">
    <div class="stripe-top"></div>
    <div class="page-header">
        <div>
            <div class="header-stars">
                <span class="star">★</span><span class="star">★</span><span class="star">★</span>
                <span class="star" style="color:var(--red)">★</span>
                <span class="star">★</span><span class="star">★</span><span class="star">★</span>
            </div>
            <div class="page-title">Financial <span>Planner</span></div>
            <div class="page-subtitle">Monthly Budget · Income · Goals</div>
        </div>
        
        <div class="header-right">
            <div class="week-label">Month / Year</div>
            <input class="week-input" type="text" placeholder="January 2026" id="monthYear">
        </div>
    </div>

    <div class="page-body">
        <div class="section-title">Monthly Overview</div>
        <div class="month-overview">
            <div class="overview-card" style="border-left-color: #2ecc71;">
                <div class="card-label">💰 Total Income</div>
                <div class="card-value"><span class="dollar-sign">$</span><input class="card-input" type="number" id="totalIncome" oninput="updateSavings()"></div>
            </div>
            <div class="overview-card" style="border-left-color: var(--red);">
                <div class="card-label">💸 Total Expenses</div>
                <div class="card-value"><span class="dollar-sign">$</span><input class="card-input" type="number" id="totalExpenses" oninput="updateSavings()"></div>
            </div>
            <div class="overview-card">
                <div class="card-label">🏦 Net Savings</div>
                <div class="card-value"><span class="dollar-sign">$</span><input class="card-input" type="text" id="netSavings" readonly value="0.00"></div>
            </div>
        </div>

        <div class="two-col">
            <div>
                <div class="section-title">Income Sources</div>
                <table class="budget-table">
                    <tr><td><input type="text" placeholder="Primary Job"></td><td><input class="amount" type="number" placeholder="0.00"></td></tr>
                    <tr><td><input type="text" placeholder="Side Hustle"></td><td><input class="amount" type="number" placeholder="0.00"></td></tr>
                </table>
            </div>
            <div>
                <div class="section-title">Fixed Expenses</div>
                <table class="budget-table">
                    <tr><td><input type="text" placeholder="Rent/Mortgage"></td><td><input class="amount" type="number" placeholder="0.00"></td></tr>
                    <tr><td><input type="text" placeholder="Food"></td><td><input class="amount" type="number" placeholder="0.00"></td></tr>
                </table>
            </div>
        </div>

        <div class="section-title">Notes</div>
        <textarea class="notes-area" placeholder="Write your intentions..."></textarea>
    </div>
</div>

<script>
    function updateSavings() {
        const inc = parseFloat(document.getElementById('totalIncome').value) || 0;
        const exp = parseFloat(document.getElementById('totalExpenses').value) || 0;
        const sav = inc - exp;
        const el = document.getElementById('netSavings');
        el.value = sav.toFixed(2);
        el.style.color = sav >= 0 ? 'var(--gold)' : 'var(--red)';
    }

    function saveData() {
        const data = {};
        document.querySelectorAll('input, textarea').forEach((el, i) => data['v'+i] = el.value);
        localStorage.setItem('finance_v2', JSON.stringify(data));
        alert('Saved! 💾');
    }

    function loadData() {
        const data = JSON.parse(localStorage.getItem('finance_v2') || '{}');
        document.querySelectorAll('input, textarea').forEach((el, i) => { if(data['v'+i] !== undefined) el.value = data['v'+i]; });
        updateSavings();
    }

    window.onload = loadData;
</script>

</body>
</html>
